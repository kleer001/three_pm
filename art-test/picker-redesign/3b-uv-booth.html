<!doctype html><html lang="en"><head><meta charset="utf-8"><title>UV · Booth</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="uv-base.css">
<style>
  header{position:absolute;top:0;left:22px;right:22px;height:74px;display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:11px;border-bottom:2px solid var(--uv)}
  .title{font-size:34px}.title small{font-size:9.5px}
  /* left tower: big arena over the dossier */
  #arena{position:absolute;left:22px;top:88px;width:300px;height:228px}
  #doss{position:absolute;left:22px;top:324px;width:300px;bottom:104px}
  #doss h2{font-size:34px}
  /* roster on the right */
  #grid{position:absolute;right:22px;top:88px;width:434px;bottom:104px}
  footer{position:absolute;left:0;right:0;bottom:0;height:92px;border-top:2px solid var(--uv);background:#060604;display:grid;grid-template-rows:1fr 1fr}
  #conga{padding:0 22px;border-bottom:1px solid #16180f}#bgrow{padding:0 22px}
  .ringdeco.r1{left:-90px;bottom:60px;width:300px;height:300px;border-color:rgba(204,255,0,.12)}
</style></head>
<body><div class="stage">
  <div class="ringdeco r1"></div>
  <header><div class="title">SELECT <em>YOUR</em> CREW<small>MERRITON HIGH · 3:00 PM · DESCENT SOUTH</small></div>
    <div class="rhead">ROSTER <b>09</b><br>UNLOCKED <b>08</b><br>SEED <b>1F4A</b></div></header>
  <div id="arena"></div><div id="doss"></div><div id="grid"></div>
  <footer><div id="conga"></div><div id="bgrow"></div></footer>
</div>
<script src="data.js"></script><script src="uv-render.js"></script>
</body></html>
