<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>2 · Y2K Aqua</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0a1622}
  .stage{width:800px;height:600px;position:relative;overflow:hidden;font-family:"Nunito",sans-serif;color:#0c2230;
    background:
      radial-gradient(80% 60% at 18% 6%, #bfefff 0%, transparent 60%),
      radial-gradient(90% 70% at 92% 4%, #d9c6ff 0%, transparent 55%),
      radial-gradient(120% 90% at 50% 120%, #6fe3d6 0%, transparent 55%),
      linear-gradient(160deg,#2bc7e6 0%, #2aa6d8 38%, #4a7fd6 100%);}
  /* glossy bloom blobs */
  .stage::before{content:"";position:absolute;inset:0;background:
    radial-gradient(40% 30% at 30% 20%, rgba(255,255,255,.55), transparent 60%),
    radial-gradient(30% 22% at 80% 78%, rgba(255,255,255,.35), transparent 60%);mix-blend-mode:screen;pointer-events:none}
  .glass{background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.18));
    border:1px solid rgba(255,255,255,.7);border-radius:18px;
    box-shadow:0 8px 24px rgba(10,40,70,.22), inset 0 1px 0 rgba(255,255,255,.9), inset 0 -10px 24px rgba(120,180,220,.18);
    backdrop-filter:blur(7px)}
  header{position:absolute;top:16px;left:18px;right:18px;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}
  header.glass{border-radius:24px}
  .logo{font-family:"Fredoka",sans-serif;font-weight:700;font-size:20px;letter-spacing:.02em;color:#0a3a52;
    text-shadow:0 1px 0 rgba(255,255,255,.8)}
  .logo b{background:linear-gradient(180deg,#ff5fa2,#e6357f);-webkit-background-clip:text;background-clip:text;color:transparent}
  .htag{font-family:"Fredoka",sans-serif;font-weight:500;font-size:12px;color:#0a3a52;background:rgba(255,255,255,.5);
    padding:5px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.8)}
  .body{position:absolute;top:80px;left:18px;right:18px;bottom:108px;display:grid;grid-template-columns:1fr 234px;gap:14px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:12px}
  .card{position:relative;border-radius:16px;padding:11px 12px;overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.26));
    border:1px solid rgba(255,255,255,.75);box-shadow:0 5px 14px rgba(10,40,70,.16), inset 0 1px 0 rgba(255,255,255,.9)}
  .card .top{display:flex;align-items:center;gap:9px}
  .orb{width:26px;height:26px;border-radius:50%;position:relative;box-shadow:inset 0 -4px 8px rgba(0,0,0,.25), 0 2px 5px rgba(0,0,0,.2)}
  .orb::after{content:"";position:absolute;left:5px;top:3px;width:12px;height:8px;border-radius:50%;background:rgba(255,255,255,.85);filter:blur(.4px)}
  .card .nm{font-family:"Fredoka",sans-serif;font-weight:600;font-size:16px;color:#0a2c40;line-height:1}
  .card .gn{font-size:10px;font-weight:700;color:#3a7c96;letter-spacing:.04em}
  .pillrow{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
  .pill{font-size:9.5px;font-weight:700;color:#0a3a52;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);
    padding:2px 7px;border-radius:999px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:9px}
  .st{text-align:center}
  .st i{font-style:normal;font-size:8px;font-weight:800;color:#4a86a0;display:block;letter-spacing:.04em}
  .st .ring{margin:2px auto 0;width:100%;height:4px;border-radius:999px;background:rgba(255,255,255,.55);overflow:hidden}
  .st .ring>span{display:block;height:100%;border-radius:999px}
  .badge{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;display:none;align-items:center;justify-content:center;
    font-family:"Fredoka";font-weight:700;font-size:11px;color:#fff;background:linear-gradient(180deg,#ff7ab0,#e6357f);box-shadow:0 2px 5px rgba(230,53,127,.5),inset 0 1px 0 rgba(255,255,255,.6)}
  .card.inparty .badge{display:flex}
  .card.sel{box-shadow:0 0 0 3px rgba(255,255,255,.9), 0 8px 22px rgba(10,40,70,.28), inset 0 1px 0 rgba(255,255,255,.95);
    background:linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.4))}
  .card.lock{filter:saturate(.5);opacity:.7}
  .card.lock .lockt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:"Fredoka";font-weight:600;font-size:12px;color:#0a3a52;background:rgba(255,255,255,.35);backdrop-filter:blur(2px)}
  /* dossier */
  .doss{border-radius:18px;padding:15px 16px;display:flex;flex-direction:column;
    background:linear-gradient(180deg, rgba(255,255,255,.6), rgba(255,255,255,.28));border:1px solid rgba(255,255,255,.78);
    box-shadow:0 8px 22px rgba(10,40,70,.2), inset 0 1px 0 rgba(255,255,255,.9)}
  .doss .bigorb{width:62px;height:62px;border-radius:50%;position:relative;box-shadow:inset 0 -8px 14px rgba(0,0,0,.28), 0 4px 10px rgba(0,0,0,.25)}
  .doss .bigorb::after{content:"";position:absolute;left:11px;top:7px;width:28px;height:18px;border-radius:50%;background:rgba(255,255,255,.85);filter:blur(.6px)}
  .doss h2{font-family:"Fredoka";font-weight:700;font-size:26px;color:#0a2c40;margin-top:10px;line-height:1}
  .doss .sub{font-weight:800;font-size:11px;color:#3a7c96;letter-spacing:.06em;margin-top:2px}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:11px;font-size:13px}
  .row .k{font-weight:800;font-size:10px;color:#4a86a0;letter-spacing:.04em}
  .row .v{font-family:"Fredoka";font-weight:600;color:#0a2c40}
  .sig{margin-top:6px;background:linear-gradient(180deg,#fff,#eafaff);border:1px solid rgba(255,255,255,.9);border-radius:12px;padding:8px 11px;
    box-shadow:inset 0 1px 0 #fff, 0 2px 6px rgba(10,40,70,.12)}
  .sig small{font-weight:800;font-size:9px;color:#4a86a0;letter-spacing:.08em;display:block}
  .sig b{font-family:"Fredoka";font-weight:600;font-size:15px;color:#e6357f}
  .dstats{margin-top:auto;display:flex;flex-direction:column;gap:6px}
  .ds{display:grid;grid-template-columns:34px 1fr 16px;gap:8px;align-items:center}
  .ds i{font-style:normal;font-weight:800;font-size:9px;color:#4a86a0}
  .ds .t{height:8px;border-radius:999px;background:rgba(255,255,255,.5);overflow:hidden;box-shadow:inset 0 1px 2px rgba(10,40,70,.18)}
  .ds .t>span{display:block;height:100%;border-radius:999px}
  .ds .nn{font-family:"Fredoka";font-weight:600;font-size:12px;text-align:right;color:#0a2c40}
  /* footer */
  footer{position:absolute;left:18px;right:18px;bottom:16px;height:84px;border-radius:20px;padding:0 14px;display:grid;grid-template-rows:1fr 1fr;align-items:center;
    background:linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,.2));border:1px solid rgba(255,255,255,.72);box-shadow:0 8px 22px rgba(10,40,70,.2), inset 0 1px 0 rgba(255,255,255,.9)}
  .conga{display:flex;align-items:center;gap:7px;overflow:hidden}
  .clab{font-weight:800;font-size:9px;color:#4a86a0;letter-spacing:.06em;margin-right:4px;white-space:nowrap}
  .chip{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.85);white-space:nowrap;box-shadow:inset 0 1px 0 #fff}
  .chip .d{width:11px;height:11px;border-radius:50%;box-shadow:inset 0 -2px 3px rgba(0,0,0,.25)}
  .chip b{font-family:"Fredoka";font-weight:500;font-size:12px;color:#0a2c40}
  .arr{color:#7fc3da;font-size:12px;font-weight:800}
  .gel{margin-left:auto;font-family:"Fredoka";font-weight:600;font-size:14px;color:#fff;padding:8px 18px;border-radius:999px;white-space:nowrap;
    background:linear-gradient(180deg,#7ef0c0 0%,#23c08a 52%,#1aa877 100%);position:relative;overflow:hidden;
    box-shadow:0 4px 12px rgba(26,168,119,.5), inset 0 1px 0 rgba(255,255,255,.8), inset 0 -6px 12px rgba(0,80,40,.25)}
  .gel::before{content:"";position:absolute;left:6px;right:6px;top:3px;height:42%;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,0))}
  .gel span{position:relative}
  .bgrow{display:flex;align-items:center;gap:14px;overflow:hidden}
  .bgrow .clab{margin-right:2px}
  .bgs{display:flex;gap:13px;align-items:center;overflow:hidden}
  .bgs b{font-family:"Fredoka";font-weight:500;font-size:12px;color:#1e6f90;opacity:.5;white-space:nowrap}
  .bgs b.on{opacity:1;color:#fff;background:linear-gradient(180deg,#ff7ab0,#e6357f);padding:3px 11px;border-radius:999px;box-shadow:0 2px 7px rgba(230,53,127,.5),inset 0 1px 0 rgba(255,255,255,.6)}
</style></head>
<body><div class="stage">
  <header class="glass"><div class="logo">3<b>PM</b> · pick your crew</div><div class="htag">◷ 3:00 · the walk home</div></header>
  <div class="body"><div class="grid" id="grid"></div><div class="doss" id="doss"></div></div>
  <footer><div class="conga" id="conga"></div><div class="bgrow" id="bgrow"></div></footer>
</div>
<script src="data.js"></script>
<script>
const grid=document.getElementById('grid');
ROSTER.forEach((h,i)=>{const inP=PARTY.indexOf(i),lk=h.lock>0;
  const el=document.createElement('div');el.className='card'+(i===SELECTED?' sel':'')+(inP>=0?' inparty':'')+(lk?' lock':'');
  el.innerHTML=`<div class="badge">${inP>=0?inP+1:''}</div>
    <div class="top"><div class="orb" style="background:radial-gradient(circle at 50% 35%, ${h.c}, ${h.c} 60%, rgba(0,0,0,.4))"></div>
      <div><div class="nm">${h.n}</div><div class="gn">${h.g}</div></div></div>
    <div class="pillrow"><span class="pill">${h.w}</span><span class="pill" style="color:#e6357f">✦ ${h.s}</span></div>
    <div class="stats">${STATS.map(([lab,k])=>`<div class="st"><i>${lab}</i><div class="ring"><span style="width:${h[k]/10*100}%;background:linear-gradient(90deg,${h.c},#fff)"></span></div></div>`).join('')}</div>
    ${lk?`<div class="lockt">🔒 run ${h.lock}</div>`:''}`;
  grid.appendChild(el);});
const h=ROSTER[SELECTED];
document.getElementById('doss').innerHTML=`
  <div class="bigorb" style="background:radial-gradient(circle at 50% 35%, ${h.c}, ${h.c} 58%, rgba(0,0,0,.45))"></div>
  <h2>${h.n}</h2><div class="sub">${h.g.toUpperCase()} · slot 3</div>
  <div class="row"><span class="k">WEAPON</span><span class="v">${h.w}</span></div>
  <div class="sig"><small>SIGNATURE PASSIVE</small><b>✦ ${h.s}</b></div>
  <div class="dstats">${STATS.map(([lab,k])=>`<div class="ds"><i>${lab}</i><div class="t"><span style="width:${h[k]/10*100}%;background:linear-gradient(90deg,${h.c},#9be7ff)"></span></div><div class="nn">${h[k]}</div></div>`).join('')}</div>`;
const conga=document.getElementById('conga');
conga.innerHTML=`<span class="clab">YOUR CREW ▸</span>`+PARTY.map((idx,o)=>{const x=ROSTER[idx];
  return `<div class="chip"><span class="d" style="background:radial-gradient(circle at 50% 35%,${x.c},${x.c} 60%,rgba(0,0,0,.35))"></span><b>${x.n}</b></div>`+(o<PARTY.length-1?'<span class="arr">›</span>':'');}).join('')+
  `<div class="gel"><span>▶ start the walk home (${PARTY.length})</span></div>`;
document.getElementById('bgrow').innerHTML=`<span class="clab">BACKDROP</span><div class="bgs">`+BGS.map((b,i)=>`<b class="${i===BG?'on':''}">${b}</b>`).join('')+`</div>`;
</script>
</body></html>
