<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>1 · Techno Readout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0e; --panel:#101319; --line:#1d222c; --ink:#e7ecf2; --dim:#7b8696;
    --acid:#c8ff2d;            /* the one system accent (Warp/tDR acid) */
    --grid:24px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  .stage{
    width:800px;height:600px;background:
      linear-gradient(0deg,#08090c,#0c0e13);
    color:var(--ink);font-family:"Space Grotesk",sans-serif;position:relative;overflow:hidden;
    /* faint engineering grid */
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:var(--grid) var(--grid);
    background-blend-mode:normal;
  }
  .stage::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 80% -10%, #11151d 0%, transparent 55%);}
  .mono{font-family:"Space Mono",monospace}
  /* ---- header ---- */
  header{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0d0f15,#0a0b0e);}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand b{font-weight:700;letter-spacing:.14em;font-size:15px}
  .brand .sub{font-size:10px;letter-spacing:.34em;color:var(--acid)}
  .sys{font-family:"Space Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.08em;text-align:right;line-height:1.5}
  .sys b{color:var(--ink)}
  /* ---- layout ---- */
  .body{position:absolute;top:54px;left:0;right:0;bottom:96px;display:grid;grid-template-columns:1fr 250px;gap:0}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);border-right:1px solid var(--line)}
  .card{position:relative;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 11px;overflow:hidden}
  .card:nth-child(3n){border-right:0}
  .card .idx{font-family:"Space Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em}
  .card .nm{font-weight:700;font-size:17px;letter-spacing:.01em;margin-top:1px;line-height:1}
  .card .gn{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.18em;color:var(--dim);margin-top:3px;text-transform:uppercase}
  .swatch{position:absolute;top:11px;right:11px;width:13px;height:13px;border-radius:50%;box-shadow:0 0 10px currentColor}
  .ld{position:absolute;inset:0;background:repeating-linear-gradient(135deg,#0c0e13 0 7px,#0a0b0e 7px 14px);display:flex;align-items:center;justify-content:center}
  .ld span{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.18em;color:#4a525f;border:1px solid #2a313d;padding:3px 7px}
  /* mini stat ticks */
  .ticks{position:absolute;left:11px;right:11px;bottom:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .tick{display:flex;flex-direction:column;gap:3px}
  .tick i{font-family:"Space Mono",monospace;font-style:normal;font-size:8px;color:var(--dim);letter-spacing:.1em}
  .bar{height:3px;background:#1b212b;position:relative}
  .bar>span{position:absolute;inset:0 auto 0 0;background:var(--acid)}
  .partybadge{position:absolute;top:9px;left:9px;width:16px;height:16px;border:1px solid var(--acid);color:var(--acid);
    font-family:"Space Mono",monospace;font-size:9px;display:none;align-items:center;justify-content:center}
  .card.inparty .partybadge{display:flex}
  .card.sel{background:linear-gradient(180deg,#12161d,#0e1118)}
  .card.sel::after{content:"";position:absolute;inset:0;border:1px solid var(--acid);box-shadow:inset 0 0 24px rgba(200,255,45,.10);pointer-events:none}
  /* ---- dossier ---- */
  .doss{padding:13px 15px;display:flex;flex-direction:column;gap:0;position:relative;background:linear-gradient(180deg,#0c0e14,#0a0b0e)}
  .doss .hd{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.28em;color:var(--dim)}
  .doss .big{font-size:46px;font-weight:700;line-height:.92;margin:6px 0 0;letter-spacing:-.02em}
  .doss .big small{display:block;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.22em;font-weight:400;margin-top:6px}
  .kv{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--line);font-size:12px}
  .kv .k{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.16em;color:var(--dim)}
  .kv .v{font-weight:500}
  .statblock{margin-top:8px;border-top:1px solid var(--line);padding-top:9px;display:flex;flex-direction:column;gap:7px}
  .srow{display:grid;grid-template-columns:30px 1fr 18px;gap:8px;align-items:center}
  .srow i{font-family:"Space Mono",monospace;font-style:normal;font-size:9px;color:var(--dim);letter-spacing:.08em}
  .srow .b{height:6px;background:#161b23;position:relative}
  .srow .b>span{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--acc),var(--acid))}
  .srow .n{font-family:"Space Mono",monospace;font-size:10px;text-align:right;color:var(--ink)}
  /* ---- footer ---- */
  footer{position:absolute;left:0;right:0;bottom:0;height:96px;border-top:1px solid var(--line);background:linear-gradient(180deg,#0a0c11,#070809);display:grid;grid-template-rows:1fr 1fr}
  .conga{display:flex;align-items:center;gap:0;padding:0 16px;border-bottom:1px solid var(--line)}
  .conga .lab{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--dim);margin-right:14px}
  .chip{display:flex;align-items:center;gap:7px;padding:5px 11px 5px 9px;border:1px solid var(--line);margin-right:7px;background:#0d1016}
  .chip .d{width:9px;height:9px;border-radius:50%}
  .chip b{font-size:12px;font-weight:500}
  .chip .o{font-family:"Space Mono",monospace;font-size:9px;color:var(--dim);margin-left:2px}
  .arrow{color:#2c333f;margin:0 3px;font-size:11px}
  .start{margin-left:auto;display:flex;align-items:center;gap:10px;padding:7px 16px;background:var(--acid);color:#0a0b0e;font-weight:700;letter-spacing:.06em;font-size:13px}
  .start .mono{color:#0a0b0e;opacity:.6;font-size:10px}
  .bgrow{display:flex;align-items:center;padding:0 16px;gap:0;overflow:hidden}
  .bgrow .lab{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--dim);margin-right:16px;white-space:nowrap}
  .bgrow .bgs{display:flex;gap:20px;align-items:center}
  .bgrow .bgs b{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;color:#3c4350;white-space:nowrap}
  .bgrow .bgs b.on{color:var(--acid);text-shadow:0 0 12px rgba(200,255,45,.5)}
  .corner{position:absolute;font-family:"Space Mono",monospace;font-size:9px;color:#2a313d;letter-spacing:.1em}
</style></head>
<body><div class="stage" id="stage">
  <header>
    <div class="brand"><b>MERRITON&nbsp;HIGH</b><span class="sub">UNIT&nbsp;SELECT</span></div>
    <div class="sys">SECTOR <b>03·PM</b> // DESCENT VECTOR <b>SOUTH</b><br>SEED <b>0x1F4A</b> // ROSTER <b>09</b> UNLOCKED <b>08</b></div>
  </header>
  <div class="body">
    <div class="grid" id="grid"></div>
    <div class="doss" id="doss"></div>
  </div>
  <footer>
    <div class="conga" id="conga"></div>
    <div class="bgrow" id="bgrow"></div>
  </footer>
</div>
<script src="data.js"></script>
<script>
const grid=document.getElementById('grid');
ROSTER.forEach((h,i)=>{
  const inP=PARTY.indexOf(i), pct=v=>Math.round(v/10*100);
  const el=document.createElement('div');
  el.className='card'+(i===SELECTED?' sel':'')+(inP>=0?' inparty':'')+(h.lock>SELECTED?'':'');
  el.style.setProperty('--acid', i===SELECTED? 'var(--acid)':h.c);
  el.innerHTML=`
    <div class="partybadge">${inP>=0?inP+1:''}</div>
    <div class="swatch" style="color:${h.c};background:${h.c}"></div>
    <div class="idx">UNIT&nbsp;${String(i+1).padStart(2,'0')}</div>
    <div class="nm">${h.n}</div>
    <div class="gn">${h.g}</div>
    <div class="ticks">${STATS.map(([lab,k])=>`<div class="tick"><i>${lab}</i><div class="bar"><span style="width:${pct(h[k])}%;background:${i===SELECTED?'var(--acid)':h.c}"></span></div></div>`).join('')}</div>
    ${h.lock>0?`<div class="ld"><span>⟳ UNLOCK · RUN ${h.lock}</span></div>`:''}`;
  grid.appendChild(el);
});
const h=ROSTER[SELECTED];
document.getElementById('doss').innerHTML=`
  <div class="hd">SELECTED&nbsp;UNIT&nbsp;//&nbsp;${String(SELECTED+1).padStart(2,'0')}</div>
  <div class="big" style="color:${h.c}">${h.n}<small style="color:var(--dim)">${h.g.toUpperCase()}&nbsp;·&nbsp;TRANCE&nbsp;CLASS</small></div>
  <div style="height:10px"></div>
  <div class="kv"><span class="k">WEAPON</span><span class="v">${h.w}</span></div>
  <div class="kv"><span class="k">SIGNATURE</span><span class="v" style="color:var(--acid)">${h.s}</span></div>
  <div class="statblock">
    ${STATS.map(([lab,k])=>`<div class="srow" style="--acc:${h.c}"><i>${lab}</i><div class="b"><span style="width:${h[k]/10*100}%"></span></div><div class="n">${h[k]}</div></div>`).join('')}
  </div>
  <div style="margin-top:auto"></div>
  <div class="kv" style="border-bottom:1px solid var(--line)"><span class="k">STATUS</span><span class="v" style="color:var(--acid)">IN PARTY · SLOT 3</span></div>`;
const conga=document.getElementById('conga');
conga.innerHTML=`<span class="lab">CONGA&nbsp;//&nbsp;HEAD→TAIL</span>`+
  PARTY.map((idx,o)=>{const x=ROSTER[idx];return `<div class="chip"><span class="d" style="background:${x.c};box-shadow:0 0 8px ${x.c}"></span><b>${x.n}</b><span class="o">${o===0?'HEAD':String(o+1)}</span></div>`+(o<PARTY.length-1?'<span class="arrow">▸</span>':'');}).join('')+
  `<div class="start">▶ START THE WALK <span class="mono">[ ${PARTY.length} ]</span></div>`;
const bgrow=document.getElementById('bgrow');
bgrow.innerHTML=`<span class="lab">VOID&nbsp;FEED</span><div class="bgs">`+
  BGS.map((b,i)=>`<b class="${i===BG?'on':''}">${i===BG?'▣ ':''}${b.toUpperCase()}</b>`).join('')+`</div>`;
</script>
</body></html>
