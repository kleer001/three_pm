<!doctype html>
<!--
  Throwaway sandbox: Baba-Is-You-style "boiling line" wobble on flat-colored
  procedural shapes. Self-contained (no imports, no assets) so it runs over
  file:// or http, and nukes cleanly — delete this one file.

  The whole trick: a small set of held variants (default 3) swapped on a SLOW
  clock that's decoupled from the 60fps render. Jitter is seeded by
  (entityId, vertex, wobbleFrame) so each shape is frozen between snaps —
  that hold-and-snap is what reads as "hand drawn" instead of TV static.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>wobble prototype</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #1b1b1f; color: #ddd; font: 13px system-ui, sans-serif; }
  .wrap { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
  canvas { background: #111; image-rendering: pixelated; border: 1px solid #333; }
  .panel { min-width: 240px; }
  .row { margin: 10px 0; }
  label { display: block; margin-bottom: 3px; color: #9aa; }
  output { color: #fff; font-weight: 600; }
  input[type=range] { width: 100%; }
  .hint { color: #778; line-height: 1.5; max-width: 320px; }
  kbd { background: #333; border-radius: 3px; padding: 1px 5px; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="720" height="480"></canvas>
  <div class="panel">
    <div class="row">
      <label>mode</label>
      <select id="mode">
        <option value="offset">whole-shape offset (cheapest)</option>
        <option value="outline" selected>outline jitter (truest Baba feel)</option>
      </select>
    </div>
    <div class="row">
      <label>wobble Hz — snaps per second <output id="hzv"></output></label>
      <input id="hz" type="range" min="1" max="24" step="1" value="7" />
    </div>
    <div class="row">
      <label>held frames <output id="framesv"></output></label>
      <input id="frames" type="range" min="2" max="6" step="1" value="3" />
    </div>
    <div class="row">
      <label>amplitude (px) <output id="ampv"></output></label>
      <input id="amp" type="range" min="0" max="6" step="0.5" value="1.5" />
    </div>
    <div class="row">
      <label><input id="snap" type="checkbox" checked /> pixel-snap</label>
      <label><input id="perEntity" type="checkbox" checked /> per-entity seed (off = lockstep)</label>
      <label><input id="wobbleTiles" type="checkbox" /> wobble tile grid too</label>
    </div>
    <p class="hint">
      Try <b>Hz 60</b> + <b>per-entity off</b> to see the "TV static" failure mode,
      then drop to <b>Hz 7</b> and turn <b>per-entity on</b> to get the boil.
      Live wobble frame: <output id="wfv">0</output>
    </p>
  </div>
</div>
<script>
const cv = document.getElementById("c"), ctx = cv.getContext("2d");

// Flat palette lifted from the game's THEME so this previews the real aesthetic.
const TILE_A = "#5a5a5a", TILE_B = "#6f9a55";
const ENTS = [
  { id: 1, x: 170, y: 150, r: 26, color: "#d35400", ring: true },
  { id: 2, x: 300, y: 240, r: 22, color: "#27ae60", ring: true },
  { id: 3, x: 460, y: 130, r: 24, color: "#8e44ad", ring: false },
  { id: 4, x: 540, y: 300, r: 20, color: "#27ae60", ring: false },
  { id: 5, x: 250, y: 360, r: 28, color: "#2d6cdf", ring: false }, // "hero"
  { id: 6, x: 410, y: 380, r: 18, color: "#d35400", ring: true },
];

const ui = id => document.getElementById(id);
const cfg = {};
function readUi() {
  cfg.mode = ui("mode").value;
  cfg.hz = +ui("hz").value;
  cfg.frames = +ui("frames").value;
  cfg.amp = +ui("amp").value;
  cfg.snap = ui("snap").checked;
  cfg.perEntity = ui("perEntity").checked;
  cfg.wobbleTiles = ui("wobbleTiles").checked;
  ui("hzv").textContent = cfg.hz;
  ui("framesv").textContent = cfg.frames;
  ui("ampv").textContent = cfg.amp;
}
["mode","hz","frames","amp","snap","perEntity","wobbleTiles"].forEach(id =>
  ui(id).addEventListener("input", readUi));
readUi();

// Deterministic jitter in [-amp, amp], keyed so it's STABLE within a held frame.
// Reseeds only when wobbleFrame (wf) changes -> hold-and-snap, not vibration.
function jit(id, k, wf) {
  const seed = (cfg.perEntity ? id * 73 : 0) + k * 131 + wf * 977;
  const h = Math.sin(seed) * 43758.5453;
  return ((h - Math.floor(h)) - 0.5) * 2 * cfg.amp;
}
const px = v => (cfg.snap ? Math.round(v) : v);

// A disc/ring drawn as an N-gon whose vertices breathe in and out by jit().
function blob(e, wf, stroke) {
  const N = 14;
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const a = (i / N) * Math.PI * 2;
    const rr = e.r + jit(e.id, i % N, wf);            // silhouette wobble
    const x = px(e.x + Math.cos(a) * rr);
    const y = px(e.y + Math.sin(a) * rr);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (stroke) { ctx.lineWidth = 3; ctx.strokeStyle = e.color; ctx.stroke(); }
  else { ctx.fillStyle = e.color; ctx.fill(); }
}

function drawEntity(e, wf) {
  if (cfg.mode === "offset") {
    // Cheapest: nudge the whole (smooth) shape by a held per-entity offset.
    const dx = px(jit(e.id, 0, wf)), dy = px(jit(e.id, 1, wf));
    ctx.beginPath();
    ctx.arc(e.x + dx, e.y + dy, e.r, 0, Math.PI * 2);
    if (e.ring) { ctx.lineWidth = 3; ctx.strokeStyle = e.color; ctx.stroke(); }
    else { ctx.fillStyle = e.color; ctx.fill(); }
  } else {
    blob(e, wf, e.ring);
  }
}

const TS = 48;
function drawTiles(wf) {
  for (let ty = 0; ty * TS < cv.height; ty++)
    for (let tx = 0; tx * TS < cv.width; tx++) {
      ctx.fillStyle = (tx + ty) % 2 ? TILE_A : TILE_B;
      let x = tx * TS, y = ty * TS, w = TS + 1, h = TS + 1;
      if (cfg.wobbleTiles) { // usually a bad idea — seams crawl; here to show why
        x += jit(tx * 31 + ty, 0, wf); y += jit(tx * 31 + ty, 1, wf);
      }
      ctx.fillRect(px(x), px(y), w, h);
    }
}

let t0 = performance.now();
function frame(now) {
  const t = (now - t0) / 1000;
  const wf = Math.floor(t * cfg.hz) % cfg.frames; // the slow, decoupled clock
  ui("wfv").textContent = wf;

  ctx.clearRect(0, 0, cv.width, cv.height);
  drawTiles(wf);
  for (const e of ENTS) drawEntity(e, wf);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
