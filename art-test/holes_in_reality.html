<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>3pm — Holes in Reality (obstacle look preview)</title>
<style>
  body { margin: 0; background: #fafafa; color: #1a1a1a;
         font: 14px/1.5 system-ui, sans-serif; display: flex; gap: 20px;
         padding: 20px; }
  #side { width: 240px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p { margin: 6px 0; color: #444; }
  button { display: block; width: 100%; text-align: left; margin: 6px 0;
           padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
           background: #fff; cursor: pointer; font: inherit; }
  button.on { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
  canvas { border: 1px solid #ccc; image-rendering: pixelated; background: #6f9a55; }
  label { display: block; margin-top: 10px; }
</style>
</head>
<body>
<div id="side">
  <h1>Holes in Reality</h1>
  <p>The scattered blocking tiles (rubble) become windows into a void. Camera scrolls south like the real run — watch the parallax.</p>
  <button data-v="stars" class="on">1 · Starfield (parallax + twinkle)</button>
  <button data-v="glitch">2 · Glitch / datamosh</button>
  <button data-v="soup">3 · Code soup (drifting glyph fog)</button>
  <button data-v="moire">4 · Moiré diamonds (dark blue)</button>
  <button data-v="ribbons">5 · Pink sinewave ribbons</button>
  <button data-v="perlin">6 · Pulsing perlin (dark rainbow)</button>
  <button data-v="flow">7 · Flow streaks (vector currents)</button>
  <button data-v="truchet">8 · Truchet weave (rerouting loops)</button>
  <button data-v="bolt">9 · Branching lightning</button>
  <label><input type="checkbox" id="rim" checked> rim glow on edges</label>
  <label><input type="checkbox" id="slow"> slow scroll</label>

  <div id="moire-ctl" style="display:none; margin-top:12px; border-top:1px solid #ddd; padding-top:8px;">
    <strong style="font-size:12px;">Moiré layers</strong>
    <div data-layer="0"></div><div data-layer="1"></div><div data-layer="2"></div>
  </div>

  <div id="ribbons-ctl" style="display:none; margin-top:12px; border-top:1px solid #ddd; padding-top:8px;">
    <strong style="font-size:12px;">Ribbons (tube shading)</strong>
  </div>

  <div id="truchet-ctl" style="display:none; margin-top:12px; border-top:1px solid #ddd; padding-top:8px;">
    <strong style="font-size:12px;">Truchet weave</strong>
  </div>
  <div id="bolt-ctl" style="display:none; margin-top:12px; border-top:1px solid #ddd; padding-top:8px;">
    <strong style="font-size:12px;">Lightning</strong>
  </div>

  <div id="flow-ctl" style="display:none; margin-top:12px; border-top:1px solid #ddd; padding-top:8px;">
    <strong style="font-size:12px;">Flow streaks</strong>
  </div>

  <div id="perlin-ctl" style="display:none; margin-top:12px; border-top:1px solid #ddd; padding-top:8px;">
    <strong style="font-size:12px;">Perlin</strong>
    <label style="font-size:11px;display:block;margin-top:6px;">rainbow repeats
      <input type="range" min="1" max="12" value="2" id="rainbowReps" style="width:120px;vertical-align:middle"><span id="rainbowRepsOut">2</span></label>
    <label style="font-size:11px;display:block;margin-top:6px;"><input type="checkbox" id="rainbowAnim" checked> animate 1↔6</label>
    <label style="font-size:11px;display:block;">period (s)
      <input type="range" min="6" max="8" step="0.1" value="7" id="rainbowPeriod" style="width:120px;vertical-align:middle"><span id="rainbowPeriodOut">7</span></label>
  </div>
</div>
<canvas id="c" width="800" height="600"></canvas>
<script>
const TS = 48, VIEW_W = 800, VIEW_H = 600;
const COLS = 24, ROWS = 200, MAP_H = ROWS * TS;
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
ctx.imageSmoothingEnabled = false;

// mulberry32 so the layout + stars are deterministic
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// --- mock map: grass ground with scattered rubble blobs ---
const tiles = new Uint8Array(COLS * ROWS); // 0 ground, 1 rubble
(function gen(){
  const r = mulberry32(1234);
  for (let i = 0; i < 90; i++) {
    const cx = (r() * COLS) | 0, cy = ((r() * (ROWS - 8)) + 4) | 0;
    const blob = 2 + ((r() * 4) | 0);
    for (let dy = -blob; dy <= blob; dy++)
      for (let dx = -blob; dx <= blob; dx++) {
        if (dx*dx + dy*dy > blob*blob) continue;
        if (r() < 0.35) continue;
        const x = cx + dx, y = cy + dy;
        if (x >= 0 && x < COLS && y >= 0 && y < ROWS) tiles[y*COLS+x] = 1;
      }
  }
})();
const isHole = (x, y) => x >= 0 && x < COLS && y >= 0 && y < ROWS && tiles[y*COLS+x] === 1;

// --- starfield: 3 parallax layers, wrapped in a cell ---
const CELL = 360;
function makeLayer(seed, n, parallax, sz, bright){
  const r = mulberry32(seed), stars = [];
  for (let i = 0; i < n; i++)
    stars.push({ x: r()*CELL, y: r()*CELL, b: bright*(0.4+0.6*r()),
                 sz: sz*(0.5+r()), tw: 0.5+r()*2.5, ph: r()*6.28,
                 hue: r()<0.15 ? (r()<0.5?"#9fd0ff":"#ffd9a0") : "#ffffff" });
  return { stars, parallax };
}
const LAYERS = [ makeLayer(7, 70, 0.12, 2, 0.5),
                 makeLayer(8, 45, 0.28, 2, 0.8),
                 makeLayer(9, 22, 0.5, 3, 1.0) ];

// --- code-soup glyphs: wide, transmission-flavored set ---
const GLYPHS = ("01{}[]<>/\\|=+*#%$&@!?;:~^()_-." +
  "ABCDEFGHJKLMNPQRTUVWXYZ" +
  "αβγδλπσφψΩμ" +
  "∑∫∂∆∇√∞≈≠≡⊕⊗⊥∴∵" +
  "←→↑↓↔⇒⇔" +
  "▓▒░█▤▥▦▧▨▩").split("");

function visibleCells(camY){
  const y0 = Math.max(0, (camY / TS) | 0), y1 = Math.min(ROWS-1, ((camY+VIEW_H)/TS|0));
  return [y0, y1];
}

// build a clip path over visible holes (union → adjacent holes read as one void)
function clipToHoles(camY){
  const [y0, y1] = visibleCells(camY);
  ctx.beginPath();
  for (let ty = y0; ty <= y1; ty++)
    for (let tx = 0; tx < COLS; tx++)
      if (tiles[ty*COLS+tx]) ctx.rect(tx*TS - 0, ty*TS - camY, TS+1, TS+1);
  ctx.clip();
}

function drawStars(camY, t){
  ctx.fillStyle = "#05060d"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  for (const L of LAYERS) {
    const ox = ((-(0)*L.parallax) % CELL), oy = ((-(camY)*L.parallax) % CELL);
    for (let by = -CELL; by < VIEW_H + CELL; by += CELL)
      for (let bx = -CELL; bx < VIEW_W + CELL; bx += CELL)
        for (const s of L.stars) {
          const a = s.b * (0.55 + 0.45*Math.sin(t*s.tw + s.ph));
          if (a <= 0.02) continue;
          ctx.globalAlpha = a;
          ctx.fillStyle = s.hue;
          ctx.fillRect((bx+ox+s.x)|0, ((by+oy+s.y)%(VIEW_H+2*CELL))|0, s.sz, s.sz);
        }
  }
  ctx.globalAlpha = 1;
}

// Stateful so bars persist (linger) instead of re-rolling every frame.
const GCOLORS = ["#ff2e88","#2effd0","#7a5cff","#101018","#1a0030"];
let gbars = [], gspawn = 0, grng = mulberry32(424242);
function updateGlitch(dt){
  // spawn ~12 bars/sec on average; each lingers, the longest ~2x the baseline life
  gspawn -= dt;
  while (gspawn <= 0) {
    gspawn += 1/12;
    const big = grng() < 0.25;                    // a quarter are tall feature bars
    const baseLife = 0.5 + grng()*0.5;            // 0.5–1.0s baseline
    const life = big ? baseLife*(1.4 + grng()*0.6) // up to ~2x for the long ones
                     : baseLife;
    gbars.push({
      x: (grng()*VIEW_W)|0, y: (grng()*VIEW_H)|0,
      w: 40 + (grng()*VIEW_W)|0,
      h: big ? (24 + grng()*40)|0 : (3 + grng()*16)|0, // big bars up to ~64px (≈4x prior max)
      c: GCOLORS[(grng()*GCOLORS.length)|0],
      a0: 0.4 + grng()*0.5, t: 0, life,
    });
  }
  for (let i = gbars.length-1; i >= 0; i--) { gbars[i].t += dt; if (gbars[i].t >= gbars[i].life) gbars.splice(i,1); }
}
function drawGlitch(camY, t){
  ctx.fillStyle = "#0a0010"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  for (const b of gbars) {
    const k = b.t / b.life;
    ctx.globalAlpha = b.a0 * (1 - k*k);           // hold, then ease out
    ctx.fillStyle = b.c;
    ctx.fillRect(b.x, b.y, b.w, b.h);
  }
  // RGB-split scanlines drifting with scroll
  ctx.globalAlpha = 0.5;
  for (let y = -(camY*0.6 % 6); y < VIEW_H; y += 6) { ctx.fillStyle = "rgba(0,0,0,0.35)"; ctx.fillRect(0,y,VIEW_W,2); }
  ctx.globalAlpha = 1;
}

function drawSoup(camY, t){
  ctx.fillStyle = "#02100a"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const layers = [ {p:0.15, fs:14, c:"#0c3", n:0.10, sp:0}, {p:0.35, fs:18, c:"#1f6", n:0.06, sp:1}, {p:0.6, fs:24, c:"#3fa", n:0.04, sp:2} ];
  const epoch = (t / 7) | 0; // glyphs hold for 7s, then quietly reshuffle
  for (const L of layers) {
    ctx.font = L.fs + "px monospace";
    const step = L.fs + 4;
    // glyph identity is keyed to WORLD row (gy + scrolled offset), so a symbol
    // stays itself as it drifts up the screen instead of flickering in place.
    const worldShift = Math.floor((camY * L.p) / step);
    const oy = (camY * L.p) % step;
    for (let gy = -step, row = 0; gy < VIEW_H + step; gy += step, row++)
      for (let gx = 0, col = 0; gx < VIEW_W; gx += step, col++) {
        const wrow = row + worldShift;
        const r = mulberry32((col*73856093 ^ wrow*19349663) + L.sp*1000 + epoch*2654435761);
        if (r() > L.n*6) continue;
        ctx.globalAlpha = 0.25 + r()*0.6;
        ctx.fillStyle = L.c;
        ctx.fillText(GLYPHS[(r()*GLYPHS.length)|0], gx, gy - oy);
      }
  }
  ctx.globalAlpha = 1; ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function drawRim(camY){
  const [y0, y1] = visibleCells(camY);
  ctx.strokeStyle = "rgba(180,200,255,0.55)"; ctx.lineWidth = 2;
  for (let ty = y0; ty <= y1; ty++)
    for (let tx = 0; tx < COLS; tx++) {
      if (!tiles[ty*COLS+tx]) continue;
      const sx = tx*TS, sy = ty*TS - camY;
      // only draw edges that border ground (so the void reads as a torn hole)
      if (!isHole(tx, ty-1)) { ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+TS,sy); ctx.stroke(); }
      if (!isHole(tx, ty+1)) { ctx.beginPath(); ctx.moveTo(sx,sy+TS); ctx.lineTo(sx+TS,sy+TS); ctx.stroke(); }
      if (!isHole(tx-1, ty)) { ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx,sy+TS); ctx.stroke(); }
      if (!isHole(tx+1, ty)) { ctx.beginPath(); ctx.moveTo(sx+TS,sy); ctx.lineTo(sx+TS,sy+TS); ctx.stroke(); }
    }
}

// ---- 4 · Moiré diamonds: 3 diagonal-lattice layers, dark blue on black ----
// period = seconds per scale-pulse cycle (-4..4; 0 = static). size pulses 0.8×–1.2×.
// Sizes are fixed close together (12–16) so the three lattices beat as moiré.
const moire = [ { size: 12, period: 2.6 }, { size: 14, period: 3.1 }, { size: 16, period: 2.8 } ];
(function buildMoireUI(){
  moire.forEach((L, i) => {
    const box = document.querySelector(`#moire-ctl div[data-layer="${i}"]`);
    box.style.margin = "8px 0";
    box.innerHTML =
      `<div style="font-size:11px;color:#666;">layer ${i+1} (size ${L.size})</div>` +
      `<label style="font-size:11px;">period <input type="range" min="-4" max="4" step="0.1" value="${L.period}" data-k="period" style="width:120px;vertical-align:middle"><span data-out="period">${L.period}</span></label>`;
    box.querySelectorAll("input").forEach(inp => inp.oninput = () => {
      L[inp.dataset.k] = +inp.value;
      box.querySelector(`span[data-out="${inp.dataset.k}"]`).textContent = inp.value;
    });
  });
})();
// Diamonds pulse in scale about the viewport center (no translation). The lattice
// spacing breathes 0.8×–1.2× of each layer's base size; near-equal sizes beat as moiré.
const SUM_A = VIEW_W/2 + VIEW_H/2, DIFF_A = VIEW_W/2 - VIEW_H/2;
function drawMoire(t){
  ctx.fillStyle = "#000308"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.lineWidth = 6; ctx.strokeStyle = "rgba(80,160,255,0.28)";
  for (const L of moire) {
    const w = L.period === 0 ? 0 : 2*Math.PI / L.period;
    const s = L.size * (1 + 0.2*Math.sin(w * t)); // breathing spacing, 0.8–1.2×
    ctx.beginPath();
    // family 1: x+y=c, anchored so the lattice scales about center
    for (let c = SUM_A - Math.ceil((SUM_A + VIEW_H)/s)*s; c < VIEW_W + VIEW_H; c += s) {
      ctx.moveTo(c, 0); ctx.lineTo(c - VIEW_H, VIEW_H);
    }
    // family 2: x-y=c, same anchoring
    for (let c = DIFF_A - Math.ceil((DIFF_A + VIEW_H)/s)*s; c < VIEW_W; c += s) {
      ctx.moveTo(c, 0); ctx.lineTo(c + VIEW_H, VIEW_H);
    }
    ctx.stroke();
  }
}

// ---- 5 · Pink sinewave ribbons: a pile of waving tubes ----
const PINKS = ["#ff5fa2","#ff9ec7","#e0408a","#ff7ab8","#c83d83"];
const ribbons = (function(){
  const r = mulberry32(99), out = [];
  for (let i = 0; i < 16; i++)
    out.push({ baseX: r()*VIEW_W, amp: 18 + r()*55, freq: 0.008 + r()*0.022,
               phase: r()*6.28, speed: (0.5 + r()*2.2) * 0.5, w: (5 + r()*16) * 10,
               c: PINKS[(r()*PINKS.length)|0] });
  return out;
})();
// Tube look = stroke stacking: wide dark edge → narrow bright core. The sliders
// drive band count, edge darkness, core highlight, width, and opacity.
const ribCfg = { widthMul: 1.3, bands: 12, edgeDark: 0.35, coreLight: 0.2, opacity: 0.5 };
function shadeHex(hex, f){ // f<0 darken toward black, f>0 lighten toward white
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const mix = c => (f < 0 ? c*(1+f) : c + (255-c)*f) | 0;
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}
function drawRibbons(t){
  ctx.fillStyle = "#160008"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  const C = ribCfg, bands = C.bands;
  for (const rb of ribbons) {
    const path = new Path2D();
    for (let y = -20, first = true; y <= VIEW_H + 20; y += 6, first = false) {
      const x = rb.baseX + Math.sin(y * rb.freq + rb.phase + t * rb.speed) * rb.amp
                         + Math.sin(y * rb.freq * 2.3 + t * rb.speed * 0.6) * rb.amp * 0.3;
      first ? path.moveTo(x, y) : path.lineTo(x, y);
    }
    for (let k = 0; k < bands; k++) {
      const tt = bands === 1 ? 1 : k / (bands - 1);        // 0 = outer edge, 1 = core
      const shade = -C.edgeDark + tt * (C.edgeDark + C.coreLight);
      ctx.strokeStyle = shadeHex(rb.c, shade);
      ctx.globalAlpha = C.opacity;
      ctx.lineWidth = Math.max(1, rb.w * C.widthMul * (1 - tt * 0.88)); // outer widest, core thin
      ctx.stroke(path);
    }
  }
  ctx.globalAlpha = 1;
}

// ---- 6 · Pulsing perlin (3D value noise), dark-rainbow palette ----
const NW = 128, NH = 96; // computed small, scaled up blurry
const noiseCanvas = document.createElement("canvas");
noiseCanvas.width = NW; noiseCanvas.height = NH;
const nctx = noiseCanvas.getContext("2d");
const nimg = nctx.createImageData(NW, NH);
function vhash(x, y, z){ // integer hash → [0,1)
  let h = (x*374761393 + y*668265263 + z*2147483647) | 0;
  h = (h ^ (h >>> 13)) * 1274126177 | 0;
  return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
}
const sstep = a => a*a*(3-2*a);
function vnoise(x, y, z){
  const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
  const xf = sstep(x-xi), yf = sstep(y-yi), zf = sstep(z-zi);
  const L = (a,b,f) => a+(b-a)*f;
  const c = (dx,dy,dz) => vhash(xi+dx, yi+dy, zi+dz);
  const x00 = L(c(0,0,0),c(1,0,0),xf), x10 = L(c(0,1,0),c(1,1,0),xf);
  const x01 = L(c(0,0,1),c(1,0,1),xf), x11 = L(c(0,1,1),c(1,1,1),xf);
  return L(L(x00,x10,yf), L(x01,x11,yf), zf);
}
function hslToRgb(h, s, l){ // h 0..1
  const a = s*Math.min(l,1-l), f = n => { const k=(n+h*12)%12; return l - a*Math.max(-1,Math.min(k-3,9-k,1)); };
  return [f(0)*255, f(8)*255, f(4)*255];
}
let rainbowReps = 2;      // manual palette-repeat count
let rainbowAnim = true;   // when on, reps oscillates 1↔6
let rainbowPeriod = 7;    // seconds per oscillation cycle
function drawPerlin(t){
  const z = t * 0.35, pulse = 0.5 + 0.5*Math.sin(t*1.4); // brightness pulse
  // smooth 1↔6 sweep when animating, else hold the manual slider value
  const reps = rainbowAnim ? 3.5 + 2.5*Math.sin(2*Math.PI * t / rainbowPeriod) : rainbowReps;
  const sc = 0.045, d = nimg.data;
  for (let py = 0; py < NH; py++)
    for (let px = 0; px < NW; px++) {
      let n = vnoise(px*sc, py*sc, z);
      n += 0.5 * vnoise(px*sc*2.1, py*sc*2.1, z*1.3); // 2 octaves
      n /= 1.5;
      const hue = (n*reps + t*0.03) % 1;           // dark rainbow, repeated `reps`×
      const light = 0.06 + n*0.18 + pulse*0.12;    // dark, pulsing
      const [r,g,b] = hslToRgb(hue, 0.85, light);
      const i = (py*NW+px)*4; d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
  nctx.putImageData(nimg, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(noiseCanvas, 0, 0, NW, NH, 0, 0, VIEW_W, VIEW_H);
  ctx.imageSmoothingEnabled = false;
}

// ---- 7 · Flow streaks: particles advected by a noise flow field (VECTOR) ----
// Soft edges come from a pre-rendered radial brush stamped per particle (cheap
// drawImage — no per-stroke shadowBlur, which was the cost). A persistent buffer
// holds the trails; fade = 0 → infinite trails that fill the void. Brushes are
// pre-tinted across the hue wheel so aging particles still marble in color.
// Trails are always infinite (no fade slider). size pulses and hue cycles per
// particle, each over its own period in [perMin,perMax] s — driven by separate
// salted random streams (sr/sph for size, hr/hph for hue) so they don't sync.
// Banked: 300 particles, size pulses 1–16 per particle — both fixed (no sliders).
const flowCfg = { count: 300, speed: 0.3, swirl: 5, perMin: 6, perMax: 8, softness: 1, hue: 0 };
const FLOW_MAX = 1500, FLOW_HUES = 24, BR = 32;
const flowCanvas = document.createElement("canvas"); flowCanvas.width = VIEW_W; flowCanvas.height = VIEW_H;
const fctx = flowCanvas.getContext("2d");
fctx.fillStyle = "#05030c"; fctx.fillRect(0,0,VIEW_W,VIEW_H);
const flowRng = mulberry32(7071);
const flowP = (function(){
  const rp = mulberry32(707), rh = mulberry32(909), p = []; // rh salted apart from rp
  for (let i = 0; i < FLOW_MAX; i++)
    p.push({ x: rp()*VIEW_W, y: rp()*VIEW_H, life: rp()*200,
             sr: rp(), sph: rp()*6.28, hr: rh(), hph: rh()*6.28 });
  return p;
})();
const flowBrush = (function(){ const a = []; for (let i = 0; i < FLOW_HUES; i++) { const c = document.createElement("canvas"); c.width = c.height = BR; a.push(c); } return a; })();
let flowBrushKey = ""; // rebuild the 24 brushes only when softness/hue actually change
function rebuildBrushes(soft, hueBase){
  const key = soft + "|" + hueBase; if (key === flowBrushKey) return; flowBrushKey = key;
  const inner = Math.min(0.95, 1 - soft); // soft=1 → gradient from center; soft=0 → near-solid disk
  for (let i = 0; i < FLOW_HUES; i++) {
    const bx = flowBrush[i].getContext("2d"); bx.clearRect(0,0,BR,BR);
    const [r,g,b] = hslToRgb(((hueBase + i/FLOW_HUES) % 1 + 1) % 1, 0.8, 0.6);
    const grad = bx.createRadialGradient(BR/2,BR/2,0, BR/2,BR/2,BR/2);
    grad.addColorStop(0, `rgba(${r|0},${g|0},${b|0},0.5)`);
    grad.addColorStop(inner, `rgba(${r|0},${g|0},${b|0},0.5)`);
    grad.addColorStop(1, `rgba(${r|0},${g|0},${b|0},0)`);
    bx.fillStyle = grad; bx.fillRect(0,0,BR,BR);
  }
}
const TAU = Math.PI * 2;
function drawFlow(t){
  const C = flowCfg, span = C.perMax - C.perMin;
  rebuildBrushes(C.softness, C.hue);
  for (let i = 0; i < C.count; i++) {
    const p = flowP[i];
    const ang = vnoise(p.x*0.004, p.y*0.004, t*0.15) * TAU * C.swirl;
    p.x += Math.cos(ang) * C.speed * 6; p.y += Math.sin(ang) * C.speed * 6; p.life++;
    const sPer = C.perMin + p.sr * span;                       // this particle's size period
    const sizeV = 1 + 15 * (0.5 + 0.5*Math.sin(t*TAU/sPer + p.sph)); // pulses 1–16
    const s2 = sizeV * 4, h = s2 / 2;
    const hPer = C.perMin + p.hr * span;                       // hue period (different salt)
    const bin = (((t/hPer + p.hph) % 1 + 1) % 1) * FLOW_HUES | 0;
    fctx.drawImage(flowBrush[bin], p.x - h, p.y - h, s2, s2);
    if (p.life > 600 || p.x < 0 || p.x > VIEW_W || p.y < 0 || p.y > VIEW_H) { // respawn to seed bare patches
      p.x = flowRng()*VIEW_W; p.y = flowRng()*VIEW_H; p.life = 0;
    }
  }
  ctx.drawImage(flowCanvas, 0, 0);
}

// ---- 8 · Multi-scale Truchet (after Carlson, Bridges 2018) ----
// One pattern, tiles at mixed sizes from a recursive quad-subdivision (a cell
// either holds a tile or splits into four). Carlson's filled style: the connector
// is a FILLED band occupying the MIDDLE THIRD of each edge (quarter-annulus, radii
// s/3..2s/3), capped by an edge-midpoint dot of radius s/6 that OVERHANGS the
// boundary (the "wing"). Because a coarse tile's dot (radius 2s/6) and the two
// fine tiles' dots (radius s/6) abut exactly, the fg connectors form one
// continuous strip across scale jumps — seamless cross-scale connection.
// Layout is stable; tiles crossfade smoothly between the two orientations.
const truCfg = { detail: 0.55, speed: 1.2, wave: 0.5 };
const TRU_SIZES = [16, 32, 64], truPad = s => Math.ceil(s/6) + 1;
const mkCanvas = sz => { const c = document.createElement("canvas"); c.width = c.height = sz; return c; };
const truSprite = {}; // size → { A, B, dots }, redrawn per frame for the live hue
TRU_SIZES.forEach(s => { const sz = s + truPad(s)*2; truSprite[s] = { A: mkCanvas(sz), B: mkCanvas(sz), dots: mkCanvas(sz) }; });
function fillPie(x, cx, cy, r, a0, a1){ x.beginPath(); x.moveTo(cx,cy); x.arc(cx,cy,r,a0,a1); x.closePath(); x.fill(); }
function fillBand(x, cx, cy, a0, a1, s){ // quarter-annulus band, width s/6 (50%), centred on the s/2 midline
  fillPie(x, cx, cy, 7*s/12, a0, a1);
  x.globalCompositeOperation = "destination-out"; fillPie(x, cx, cy, 5*s/12, a0, a1);
  x.globalCompositeOperation = "source-over";
}
function redrawTruSprites(fg){
  const H = Math.PI/2, PI = Math.PI;
  for (const s of TRU_SIZES) {
    const p = truPad(s), sz = s + p*2;
    const xA = truSprite[s].A.getContext("2d"); xA.clearRect(0,0,sz,sz); xA.save(); xA.translate(p,p); xA.fillStyle = fg;
    fillBand(xA, 0, 0, 0, H, s); fillBand(xA, s, s, PI, PI+H, s); xA.restore();          // "\": NW + SE
    const xB = truSprite[s].B.getContext("2d"); xB.clearRect(0,0,sz,sz); xB.save(); xB.translate(p,p); xB.fillStyle = fg;
    fillBand(xB, s, 0, H, PI, s); fillBand(xB, 0, s, PI+H, TAU, s); xB.restore();          // "/": NE + SW
    const xD = truSprite[s].dots.getContext("2d"); xD.clearRect(0,0,sz,sz); xD.save(); xD.translate(p,p); xD.fillStyle = fg;
    const r = s/6;
    for (const [mx,my] of [[s/2,0],[s,s/2],[s/2,s],[0,s/2]]) { xD.beginPath(); xD.arc(mx,my,r,0,TAU); xD.fill(); }
    xD.restore();
  }
}
// Position-seeded so the pattern is defined over infinite vertical space and can
// scroll seamlessly. Each 64-supercell subdivides with an rng keyed to its grid
// coords (+ a plane salt), then each leaf tile snaps between orientations.
function truHash(a,b){ let h = (a*73856093 ^ b*19349663) | 0; h = (h ^ (h>>>13))*1274126177 | 0; return h; }
function drawTruPlane(t, scrollY, salt, alpha){
  const MIN = 16, MAX = 64;
  ctx.globalAlpha = alpha;
  const gy0 = Math.floor(scrollY/MAX) - 1, gy1 = Math.floor((scrollY+VIEW_H)/MAX) + 1, gx1 = Math.ceil(VIEW_W/MAX);
  for (let gy = gy0; gy <= gy1; gy++)
    for (let gx = 0; gx < gx1; gx++) {
      const r = mulberry32((truHash(gx,gy) ^ (salt*2654435761|0)) | 0);
      const rec = (x,y,size) => {
        if (size > MIN && r() < truCfg.detail) { const hh = size/2; rec(x,y,hh); rec(x+hh,y,hh); rec(x,y+hh,hh); rec(x+hh,y+hh,hh); }
        else {
          const orient = Math.sin(t*truCfg.speed + (x+y)/64*truCfg.wave + r()*TAU) > 0 ? "A" : "B"; // snappy flip
          const p = truPad(size), S = truSprite[size], dx = x - p, dy = (y - scrollY) - p;
          ctx.drawImage(S[orient], dx, dy);
          ctx.drawImage(S.dots, dx, dy);
        }
      };
      rec(gx*MAX, gy*MAX, MAX);
    }
}
// far → back → front; each plane's hue is offset 1/3 of the cycle from the next.
const truPlanes = [
  { scroll: 0.125, salt: 7777, alpha: 0.25, phase: 2*TAU/3 }, // far
  { scroll: 0.25,  salt: 9991, alpha: 0.5,  phase: TAU/3 },   // back
  { scroll: 0.5,   salt: 0,    alpha: 1.0,  phase: 0 },       // front
];
function drawTruchet(t, camY){
  ctx.fillStyle = "#04060a"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  for (const pl of truPlanes) {
    const k = 0.5 + 0.5*Math.sin(TAU*t/36 + pl.phase); // 36 s cycle, 1/3 phase apart
    const [rr,gg,bb] = hslToRgb(0.33 + 0.34*k, 0.8, 0.6); // green ↔ blue only
    redrawTruSprites(`rgb(${rr|0},${gg|0},${bb|0})`);
    drawTruPlane(t, camY*pl.scroll, pl.salt, pl.alpha);
  }
  ctx.globalAlpha = 1;
}

// ---- 9 · Branching lightning: fractal bolts that crawl + fork + flicker ----
// Geometry reseeds `flicker` times/sec so each bolt jitters and reroutes.
function buildBolt(x1,y1,x2,y2,disp,rng,depth,branchProb,out,curr){
  if (depth <= 0) { curr.push(x2,y2); return; }
  const mx = (x1+x2)/2 + (rng()-0.5)*disp, my = (y1+y2)/2 + (rng()-0.5)*disp;
  buildBolt(x1,y1,mx,my,disp*0.6,rng,depth-1,branchProb,out,curr);
  if (rng() < branchProb) {                           // fork a branch off the midpoint
    const ang = Math.atan2(my-y1,mx-x1) + (rng()-0.5)*1.3, len = disp*2.2;
    const br = [mx,my];
    buildBolt(mx,my,mx+Math.cos(ang)*len,my+Math.sin(ang)*len,disp*0.6,rng,depth-1,0,out,br);
    out.push(br);
  }
  buildBolt(mx,my,x2,y2,disp*0.6,rng,depth-1,branchProb,out,curr);
}
// Each bolt has stable per-bolt identity: own flicker rate (0.5–5 Hz → lifetime
// 0.2–2 s, its own reseed schedule), stroke width (1–2), jaggedness (80–100) and
// branchiness (1–2 → branch probability 0–1). Hue fixed. Count breathes 10↔40.
const BOLT_MAX = 40;
const boltParams = (function(){
  const a = [];
  for (let b = 0; b < BOLT_MAX; b++) { const r = mulberry32(b*99991 + 7);
    a.push({ fr: 0.5 + 4.5*r(), w: 1 + r(), jag: 80 + 20*r(), br: 1 + r() }); }
  return a;
})();
const BOLT_GLOW = (function(){ const [r,g,b] = hslToRgb(0.62, 0.6, 0.65); return `rgb(${r|0},${g|0},${b|0})`; })();
function drawBolt(t){
  ctx.fillStyle = "#03030a"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  const count = Math.round(10 + 30*Math.abs(Math.sin(TAU*t/24))); // rectified sine: 10 ↔ 40, dips every 12 s
  for (let b = 0; b < count && b < BOLT_MAX; b++) {
    const P = boltParams[b];
    const life = t*P.fr, epoch = Math.floor(life), frac = life - epoch; // 0→1 through this strike's life
    const rng = mulberry32(b*1000 + epoch*7 + 1);     // own flicker schedule
    const x1 = rng()*VIEW_W, x2 = Math.max(0, Math.min(VIEW_W, x1 + (rng()-0.5)*VIEW_W*0.5));
    const out = [], main = [x1, -10];
    buildBolt(x1, -10, x2, VIEW_H+10, P.jag, rng, 6, P.br - 1, out, main); // branchProb = br−1
    out.push(main);
    const alpha = (0.5 + 0.5*rng()) * Math.exp(-5*frac); // flash bright, fade fast (exponential)
    for (const poly of out) {
      ctx.beginPath(); ctx.moveTo(poly[0], poly[1]);
      for (let i = 2; i < poly.length; i += 2) ctx.lineTo(poly[i], poly[i+1]);
      ctx.globalAlpha = alpha*0.3; ctx.strokeStyle = BOLT_GLOW;  ctx.lineWidth = P.w*4; ctx.stroke();
      ctx.globalAlpha = alpha;     ctx.strokeStyle = "#eaf2ff";  ctx.lineWidth = P.w;   ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

let variant = "stars", t0 = performance.now(), tPrev = t0;
function frame(now){
  const t = (now - t0) / 1000;
  const dt = Math.min(0.05, (now - tPrev) / 1000); tPrev = now;
  const speed = document.getElementById("slow").checked ? 30 : 90;
  const camY = (t * speed) % (MAP_H - VIEW_H);
  updateGlitch(dt);

  // ground
  ctx.fillStyle = "#6f9a55"; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  const [y0,y1] = visibleCells(camY);
  for (let ty=y0; ty<=y1; ty++) for (let tx=0; tx<COLS; tx++) {
    if (tiles[ty*COLS+tx]) continue;
    ctx.fillStyle = ((tx+ty)&1) ? "#6f9a55" : "#688f50";
    ctx.fillRect(tx*TS, ty*TS-camY, TS+1, TS+1);
  }

  // void pass, clipped to holes
  ctx.save();
  clipToHoles(camY);
  if (variant === "stars") drawStars(camY, t);
  else if (variant === "glitch") drawGlitch(camY, t);
  else if (variant === "soup") drawSoup(camY, t);
  else if (variant === "moire") drawMoire(t);
  else if (variant === "ribbons") drawRibbons(t);
  else if (variant === "perlin") drawPerlin(t);
  else if (variant === "flow") drawFlow(t);
  else if (variant === "truchet") drawTruchet(t, camY);
  else drawBolt(t);
  ctx.restore();

  if (document.getElementById("rim").checked) drawRim(camY);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

document.querySelectorAll("button[data-v]").forEach(b => b.onclick = () => {
  variant = b.dataset.v;
  document.querySelectorAll("button[data-v]").forEach(x => x.classList.toggle("on", x===b));
  ["moire","ribbons","perlin","flow","truchet","bolt"].forEach(v =>
    document.getElementById(v + "-ctl").style.display = variant === v ? "block" : "none");
});

// Generic slider builder: each spec [key,label,min,max,step] binds to cfg[key].
function buildSliders(panelId, cfg, specs){
  const panel = document.getElementById(panelId);
  specs.forEach(([k,label,min,max,step]) => {
    const wrap = document.createElement("label");
    wrap.style.cssText = "font-size:11px;display:block;margin-top:6px;";
    wrap.innerHTML = `${label} <input type="range" min="${min}" max="${max}" step="${step}" value="${cfg[k]}" style="width:120px;vertical-align:middle"><span>${cfg[k]}</span>`;
    const inp = wrap.querySelector("input"), out = wrap.querySelector("span");
    inp.oninput = () => { cfg[k] = +inp.value; out.textContent = inp.value; };
    panel.appendChild(wrap);
  });
}
buildSliders("ribbons-ctl", ribCfg, [
  ["widthMul","width ×",0.3,2.5,0.05], ["bands","shading bands",1,12,1],
  ["edgeDark","edge darkness",0,1,0.05], ["coreLight","core highlight",0,1,0.05],
  ["opacity","opacity",0.2,1,0.05] ]);
buildSliders("flow-ctl", flowCfg, [
  ["speed","speed",0.3,4,0.1], ["swirl","swirl",0.5,5,0.1],
  ["perMin","period min (s)",1,10,0.5], ["perMax","period max (s)",1,10,0.5],
  ["softness","softness",0,1,0.05], ["hue","hue",0,1,0.02] ]);
buildSliders("truchet-ctl", truCfg, [
  ["detail","detail (subdivide)",0,0.95,0.05], ["speed","morph speed",0.1,3,0.1],
  ["wave","wave",0,2,0.05] ]);
// bolt count auto-breathes 10↔40 — no slider.

const repsInput = document.getElementById("rainbowReps");
repsInput.oninput = () => { rainbowReps = +repsInput.value; document.getElementById("rainbowRepsOut").textContent = repsInput.value; };
const animInput = document.getElementById("rainbowAnim");
animInput.onchange = () => { rainbowAnim = animInput.checked; };
const periodInput = document.getElementById("rainbowPeriod");
periodInput.oninput = () => { rainbowPeriod = +periodInput.value; document.getElementById("rainbowPeriodOut").textContent = periodInput.value; };
</script>
