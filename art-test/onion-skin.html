<!doctype html>
<meta charset="utf-8">
<title>3pm — shake & impact onion-skin A/B</title>
<!--
  Onion-skin verification for the camera-shake + impact-particle tuning. A single still can't show
  motion, so this SIMULATES each effect frame-by-frame at 60fps and COMPOSITES every frame at low
  alpha into one image — the smear IS the motion envelope: wide spread = strong, tight cluster =
  weak, jagged spacing = high-frequency buzz, how fast the ghosts collapse to center = decay.
  Every row is OLD (pre-change) | NEW (live from balance.js), so the diff is legible at a glance.

  The shake math is copied VERBATIM from src/run/shake.js (the sandbox is allowed to snapshot game
  pieces); NEW configs are imported live from balance.js so this reflects exactly what shipped.
  Serve from the repo root over HTTP (../src import) — driven headless by tools/onion-verify.mjs.
-->
<style>
  body { margin:0; background:#111; color:#ccc; font:12px/1.4 system-ui,sans-serif; padding:16px; }
  h1 { font-size:15px; margin:0 0 4px; color:#fff; }
  .sub { color:#888; margin:0 0 14px; }
  .grid { display:grid; grid-template-columns:70px 300px 300px; gap:8px 10px; align-items:center; }
  .kind { text-align:right; color:#eee; font-weight:600; }
  .col-head { color:#9ad; font-weight:600; text-align:center; padding-bottom:2px; }
  figure { margin:0; }
  canvas { display:block; border-radius:6px; background:#1c1c1c; }
  figcaption { color:#7d7d7d; font-size:10px; margin-top:2px; text-align:center; font-variant-numeric:tabular-nums; }
</style>
<body>
<h1>Camera shake &amp; impact particles — onion-skin A/B</h1>
<p class="sub">Each cell composites ~all frames of one effect at low alpha. OLD = before this branch, NEW = live from <code>balance.js</code>. Numbers under shake cells: peak camera offset (px) · peak rotation (°) · settle time (s).</p>
<div class="grid" id="grid"></div>

<script type="module">
import { BALANCE, THEME } from "../src/run/balance.js";

// ---- shake math: copied VERBATIM from src/run/shake.js, parameterized by a KINDS object ----------
const DEG = Math.PI / 180;
function hash(n) {
  n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
  n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
  n = n ^ (n >>> 16);
  return (n >>> 0) / 4294967295 * 2 - 1;
}
function noise(seed, x) {
  const s = Math.imul(seed, 0x9e3779b1) | 0;
  const xi = Math.floor(x), xf = x - xi, u = xf * xf * (3 - 2 * xf);
  return hash((xi | 0) + s) + (hash((xi + 1 | 0) + s) - hash((xi | 0) + s)) * u;
}
function createShake(KINDS) {
  let trauma = 0, clock = 0;
  let kx = 0, ky = 0, kvx = 0, kvy = 0;
  let p = KINDS.boom;
  const adopt = (r) => { if (r.trauma >= trauma) p = r; };
  function addShake(kind) { const r = KINDS[kind]; if (!r) return; adopt(r); trauma = Math.min(1, trauma + r.trauma); }
  function addKick(kind, dx, dy) {
    const r = KINDS[kind]; if (!r) return; adopt(r); trauma = Math.min(1, trauma + r.trauma);
    if (r.kickMag) { const m = Math.hypot(dx, dy) || 1; kx += dx / m * r.kickMag; ky += dy / m * r.kickMag; }
  }
  function step(dt) {
    clock += dt;
    trauma = Math.max(0, trauma - p.recovery * dt);
    const ax = -p.stiffness * kx - p.damping * kvx, ay = -p.stiffness * ky - p.damping * kvy;
    kvx += ax * dt; kvy += ay * dt; kx += kvx * dt; ky += kvy * dt;
  }
  function offset() {
    const s = Math.pow(trauma, p.exponent), f = clock * p.frequency;
    return { dx: p.maxOffset * s * noise(1, f) + kx, dy: p.maxOffset * s * noise(2, f) + ky,
             angle: p.maxAngle * DEG * s * noise(3, f) };
  }
  function alive() { return trauma > 0.002 || Math.hypot(kx, ky, kvx, kvy) > 0.05; }
  return { addShake, addKick, step, offset, alive };
}

// ---- OLD recipes (pre-branch), NEW read live from balance.js -------------------------------------
const OLD_SHAKE = {
  tap:    { trauma: 0.35, exponent: 2,   maxOffset: 16, maxAngle: 0.6, frequency: 30, recovery: 3,   kickMag: 0,  stiffness: 200, damping: 16 },
  pulse:  { trauma: 0.4,  exponent: 1.5, maxOffset: 18, maxAngle: 4,   frequency: 24, recovery: 1,   kickMag: 0,  stiffness: 200, damping: 16 },
  boom:   { trauma: 0.7,  exponent: 2,   maxOffset: 34, maxAngle: 6.2, frequency: 16, recovery: 0.9, kickMag: 0,  stiffness: 200, damping: 16 },
  kick:   { trauma: 0.15, exponent: 2,   maxOffset: 10, maxAngle: 1,   frequency: 28, recovery: 2.5, kickMag: 16, stiffness: 220, damping: 14 },
  slam:   { trauma: 0.5,  exponent: 2,   maxOffset: 32, maxAngle: 6,   frequency: 28, recovery: 1,   kickMag: 36, stiffness: 130, damping: 12 },
  rumble: { trauma: 0.35, exponent: 2.5, maxOffset: 32, maxAngle: 4,   frequency: 7,  recovery: 0.5, kickMag: 0,  stiffness: 200, damping: 16 },
};
const NEW_SHAKE = BALANCE.shake;
const OLD_IMPACT = { count: 8, speed: 305, speedJit: 0.35, spreadDeg: 160, size: 1.3, sizeJit: 0.8,
  endScale: 0, life: 0.18, lifeJit: 0.1, gravity: 0, drag: 8.5, fadePow: 0.9, ring: { r0: 0, r1: 26, life: 0.21, width: 1 } };
const NEW_IMPACT = THEME.impact;

const CW = 300, CH = 172, DT = 1 / 60, TAU = Math.PI * 2;

// ---- shake onion skin: composite a viewport frame + crosshair at each frame's offset -------------
// A kick is directional, so drive kick/slam with a diagonal impact vector; the rest are pure trauma.
function drawShakeCell(cv, KINDS, kind) {
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#1c1c1c"; ctx.fillRect(0, 0, CW, CH);
  const cx = CW / 2, cy = CH / 2;
  // static reference dot grid (so ghost displacement is legible against fixed points)
  ctx.fillStyle = "rgba(255,255,255,0.10)";
  for (let gx = 30; gx < CW; gx += 30) for (let gy = 26; gy < CH; gy += 26) { ctx.beginPath(); ctx.arc(gx, gy, 1, 0, TAU); ctx.fill(); }

  const sh = createShake(KINDS);
  if (KINDS[kind].kickMag) sh.addKick(kind, 0.6, 0.8); else sh.addShake(kind);

  const samples = [];
  let peakOff = 0, peakAng = 0, t = 0, guard = 0;
  // include the t=0 offset, then step
  do {
    const o = sh.offset();
    samples.push({ ...o, t });
    peakOff = Math.max(peakOff, Math.hypot(o.dx, o.dy));
    peakAng = Math.max(peakAng, Math.abs(o.angle));
    sh.step(DT); t += DT; guard++;
  } while (sh.alive() && guard < 240);
  const settle = t;

  const fw = CW * 0.62, fh = CH * 0.62; // the ghosted "viewport" rectangle
  samples.forEach((o, i) => {
    const age = i / (samples.length - 1 || 1);      // 0 = impact, 1 = settled
    const hue = 12 + age * 200;                       // warm (fresh) -> cool (settling)
    ctx.save();
    ctx.translate(cx + o.dx, cy + o.dy);
    ctx.rotate(o.angle);
    ctx.strokeStyle = `hsla(${hue|0},85%,60%,${(0.06 + 0.10 * (1 - age)).toFixed(3)})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(-fw / 2, -fh / 2, fw, fh);
    ctx.restore();
  });
  // center-point trail
  ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 1; ctx.beginPath();
  samples.forEach((o, i) => { const X = cx + o.dx, Y = cy + o.dy; i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); });
  ctx.stroke();
  // rest crosshair
  ctx.strokeStyle = "rgba(120,200,255,0.7)"; ctx.beginPath();
  ctx.moveTo(cx - 6, cy); ctx.lineTo(cx + 6, cy); ctx.moveTo(cx, cy - 6); ctx.lineTo(cx, cy + 6); ctx.stroke();

  return `peak ${peakOff.toFixed(1)}px · ${(peakAng / DEG).toFixed(1)}° · settle ${settle.toFixed(2)}s`;
}

// ---- particle onion skin: composite the whole burst's frames; the smear = spray envelope --------
const rnd = (a, b) => a + Math.random() * (b - a);
function drawImpactCell(cv, IMPACT) {
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#1c1c1c"; ctx.fillRect(0, 0, CW, CH);
  const cx = CW / 2, cy = CH / 2, color = THEME.pellet; // player shot color
  const half = (IMPACT.spreadDeg * Math.PI / 180) / 2, dir = -Math.PI / 2; // firing "up"
  const fx = [];
  for (let i = 0; i < IMPACT.count; i++) {
    const a = IMPACT.spreadDeg >= 359 ? rnd(0, TAU) : dir + rnd(-half, half);
    const sp = IMPACT.speed * (1 + rnd(-IMPACT.speedJit, IMPACT.speedJit));
    const r = IMPACT.size * (1 + rnd(-IMPACT.sizeJit, IMPACT.sizeJit));
    fx.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r, t: 0,
              life: IMPACT.life * (1 + rnd(-IMPACT.lifeJit, IMPACT.lifeJit)), color });
  }
  const ring = { x: cx, y: cy, t: 0, life: IMPACT.ring.life, r0: IMPACT.ring.r0, r1: IMPACT.ring.r1, width: IMPACT.ring.width, color };

  const decayOf = (dt) => Math.exp(-IMPACT.drag * dt);
  let guard = 0;
  let live = true;
  while (live && guard < 120) {
    live = false;
    // draw this frame's state at low alpha (onion accumulation)
    for (const p of fx) {
      if (p.t >= p.life) continue; live = true;
      const k = p.t / p.life;
      ctx.globalAlpha = Math.pow(1 - k, IMPACT.fadePow) * 0.22;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.r * (1 + (IMPACT.endScale - 1) * k)), 0, TAU); ctx.fill();
    }
    if (ring.t < ring.life) {
      live = true; const k = ring.t / ring.life;
      ctx.globalAlpha = Math.pow(1 - k, 1.4) * 0.5;
      ctx.strokeStyle = ring.color; ctx.lineWidth = ring.width;
      ctx.beginPath(); ctx.arc(ring.x, ring.y, ring.r0 + (ring.r1 - ring.r0) * k, 0, TAU); ctx.stroke();
    }
    // advance
    const decay = decayOf(DT);
    for (const p of fx) { p.t += DT; if (p.t > p.life) continue; p.vx *= decay; p.vy = p.vy * decay + IMPACT.gravity * DT; p.x += p.vx * DT; p.y += p.vy * DT; }
    ring.t += DT; guard++;
  }
  ctx.globalAlpha = 1;
  return `count ${IMPACT.count} · size ${IMPACT.size} · life ${IMPACT.life}s`;
}

// ---- lay out the grid ----------------------------------------------------------------------------
const grid = document.getElementById("grid");
const cell = (label) => {
  const fig = document.createElement("figure");
  const cv = document.createElement("canvas"); cv.width = CW; cv.height = CH;
  const cap = document.createElement("figcaption"); cap.textContent = label;
  fig.append(cv, cap); return { fig, cv, cap };
};
grid.append(Object.assign(document.createElement("div"), { className: "kind" }),
  Object.assign(document.createElement("div"), { className: "col-head", textContent: "OLD" }),
  Object.assign(document.createElement("div"), { className: "col-head", textContent: "NEW" }));

for (const kind of ["tap", "kick", "slam", "boom", "pulse", "rumble"]) {
  grid.append(Object.assign(document.createElement("div"), { className: "kind", textContent: kind }));
  const a = cell(""), b = cell("");
  a.cap.textContent = drawShakeCell(a.cv, OLD_SHAKE, kind);
  b.cap.textContent = drawShakeCell(b.cv, NEW_SHAKE, kind);
  grid.append(a.fig, b.fig);
}
grid.append(Object.assign(document.createElement("div"), { className: "kind", textContent: "impact\nparticles" }));
{
  const a = cell(""), b = cell("");
  a.cap.textContent = drawImpactCell(a.cv, OLD_IMPACT);
  b.cap.textContent = drawImpactCell(b.cv, NEW_IMPACT);
  grid.append(a.fig, b.fig);
}
window.__done = true;
</script>
</body>
</html>
